<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crystal Training Academy</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#0B1F3A,#1E3C72,#F36A10);

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:25px;

}

.card{

width:100%;
max-width:420px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(18px);

border-radius:28px;

padding:40px 30px;

text-align:center;

box-shadow:0 15px 40px rgba(0,0,0,.25);

border:1px solid rgba(255,255,255,.18);

}

.logo{

width:160px;

margin:auto;

display:block;

margin-bottom:18px;

}

h1{

font-size:30px;

color:#fff;

font-weight:700;

margin-bottom:8px;

}

.subtitle{

color:#f2f2f2;

font-size:15px;

margin-bottom:35px;

line-height:1.7;

}

.button{

display:flex;

align-items:center;

justify-content:center;

text-decoration:none;

padding:16px;

border-radius:14px;

margin-bottom:18px;

font-weight:600;

font-size:17px;

transition:.3s;

color:white;

}

.button:hover{

transform:translateY(-3px);

}

.instagram{

background:#E1306C;

}

.facebook{

background:#1877F2;

}

.tiktok{

background:#111111;

}

.footer{

margin-top:25px;

color:white;

font-size:13px;

opacity:.8;

}

</style>

</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h1>Crystal Training Academy</h1>

<div class="subtitle">

Connect with us on social media and stay updated with our latest hospitality training programs, events and career opportunities.

</div>

<a class="button instagram" href="https://www.instagram.com/crystaltrainingacademy/" target="_blank">

📷 Instagram

</a>

<a class="button facebook" href="https://www.facebook.com/profile.php?id=61591510772872&ref=PROFILE_EDIT_xav_ig_profile_page_web#" target="_blank">

👍 Facebook

</a>

<a class="button tiktok" href="https://www.tiktok.com/@crystaltrainingacademy?is_from_webapp=1&sender_device=pc" target="_blank">

🎵 TikTok

</a>

<div class="footer">

Learn • Practice • Succeed

</div>

</div>

</body>

</html>
